<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aayush Navbar Demo</title>
  <style>
    :root{
      --card-bg: rgba(10, 14, 32, 0.58);
      --card-border: rgba(110, 140, 255, 0.28);
      --text: #f4f7ff;
      --muted: rgba(244,247,255,0.8);
      --active: #4da3ff;
      --glass-shadow: 0 18px 50px rgba(0,0,0,0.35);
    }

    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body{
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
      background: #050816;
    }

    .scene{
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      overflow: hidden;
    }

    /* ---------- background themes ---------- */
    .space{
      background:
        radial-gradient(circle at 20% 20%, rgba(120,110,255,0.55), transparent 18%),
        radial-gradient(circle at 80% 25%, rgba(70,120,255,0.5), transparent 16%),
        radial-gradient(circle at 50% 80%, rgba(15,20,60,0.8), transparent 28%),
        linear-gradient(180deg, #050816 0%, #0b1030 45%, #060816 100%);
    }

    .rain{
      background:
        linear-gradient(rgba(4,7,20,0.62), rgba(4,7,20,0.62)),
        radial-gradient(circle at 60% 15%, rgba(60,100,255,0.55), transparent 18%),
        linear-gradient(180deg, #050816 0%, #081327 50%, #02040a 100%);
    }

    .snow{
      background:
        linear-gradient(rgba(7,14,34,0.42), rgba(7,14,34,0.42)),
        linear-gradient(180deg, #10182d 0%, #24395d 45%, #1d2d4a 100%);
    }

    .sunset{
      background:
        linear-gradient(rgba(63,16,38,0.28), rgba(63,16,38,0.28)),
        linear-gradient(180deg, #1a1022 0%, #4b1f3c 42%, #ff8a4c 100%);
    }

    /* ---------- decorative lights ---------- */
    .scene::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.9) 0 1px, transparent 1.6px);
      background-size: 120px 120px;
      opacity: 0.35;
      pointer-events:none;
      mix-blend-mode: screen;
    }

    .scene::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.06), transparent 20%, transparent 80%, rgba(255,255,255,0.04));
    }

    .scene.rain::before{
      background-image:
        linear-gradient(180deg, rgba(255,255,255,0.18) 0 16%, transparent 16% 100%);
      background-size: 2px 24px;
      background-position: 0 0;
      opacity: 0.20;
      transform: skewX(-12deg);
    }

    .scene.snow::before{
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.92) 0 1.8px, transparent 2px);
      background-size: 36px 36px;
      opacity: 0.55;
    }

    .scene.sunset::before{
      background-image:
        radial-gradient(circle, rgba(255,230,180,0.82) 0 1.5px, transparent 2px);
      background-size: 140px 140px;
      opacity: 0.18;
    }

    /* ---------- navbar ---------- */
    .navbar{
      width: min(1650px, calc(100vw - 48px));
      height: 118px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.10);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }

    .navbar::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent 30%);
      pointer-events:none;
    }

    .brand{
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 210px;
      flex-shrink: 0;
    }

    .brand svg{
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 10px rgba(77,163,255,0.25));
    }

    .brand-name{
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1;
    }

    .nav-center{
      display: flex;
      align-items: center;
      gap: 48px;
      flex: 1;
      justify-content: center;
      padding: 0 24px;
    }

    .nav-item{
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      text-decoration: none;
      font-size: 24px;
      font-weight: 500;
      padding: 10px 2px 12px;
      transition: 0.25s ease;
      white-space: nowrap;
    }

    .nav-item svg{
      width: 28px;
      height: 28px;
      stroke-width: 2.2;
      flex-shrink: 0;
    }

    .nav-item:hover{
      color: #ffffff;
      transform: translateY(-1px);
    }

    .nav-item.active{
      color: var(--active);
      text-shadow: 0 0 20px rgba(77,163,255,0.18);
    }

    .nav-item.active::after{
      content:"";
      position:absolute;
      left: 50%;
      bottom: -8px;
      width: 44px;
      height: 4px;
      border-radius: 999px;
      transform: translateX(-50%);
      background: var(--active);
      box-shadow: 0 0 18px rgba(77,163,255,0.42);
    }

    .divider{
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.22);
      margin: 0 8px;
      flex-shrink: 0;
    }

    .theme-btn{
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 22px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    .theme-btn svg{
      width: 30px;
      height: 30px;
      stroke-width: 2.2;
      flex-shrink: 0;
    }

    .chev{
      width: 18px !important;
      height: 18px !important;
      opacity: 0.95;
    }

    .icon-blue{
      color: #4da3ff;
    }

    .icon-white{
      color: rgba(255,255,255,0.9);
    }

    .icon-yellow{
      color: #ffbd2e;
    }

    .icon-snow{
      color: #dfeaff;
    }

    .icon-sun{
      color: #ffb42a;
    }

    .scene-label{
      position:absolute;
      top: 22px;
      left: 30px;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    /* ---------- responsive ---------- */
    @media (max-width: 1200px){
      .navbar{
        height: auto;
        padding: 22px;
        flex-direction: column;
        gap: 18px;
      }

      .brand{
        min-width: auto;
        width: 100%;
        justify-content: center;
      }

      .nav-center{
        width: 100%;
        flex-wrap: wrap;
        gap: 28px;
      }

      .divider{
        display: none;
      }
    }

    @media (max-width: 720px){
      .brand-name{ font-size: 24px; }
      .nav-item{ font-size: 18px; gap: 8px; }
      .nav-item svg{ width: 22px; height: 22px; }
      .theme-btn{ font-size: 18px; }
      .navbar{ width: min(100vw - 24px, 1650px); border-radius: 24px; }
    }
  </style>
</head>

  <script>
    // simple active state switch for each navbar
    document.querySelectorAll('.navbar').forEach(nav => {
      const items = nav.querySelectorAll('.nav-item');
      items.forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
        });
      });
    });
  </script>
